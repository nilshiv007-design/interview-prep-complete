<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    rel="stylesheet">
  <style>

      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #1a1a24;
      --bg4: #222230;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #e8e8f0;
      --text2: #9898b0;
      --text3: #606075;
      --accent: #7c6fff;
      --accent2: #ff6f91;
      --accent3: #6fffd4;
      --accent4: #ffd96f;
      --js: #f7df1e;
      --es6: #ff8c42;
      --react: #61dafb;
      --green: #4ade80;
      --red: #f87171;
      --sidebar-w: 280px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;

      color: var(--text);
      display: flex;
      min-height: 100vh;
      overflow: hidden;

    /* ── SIDEBAR ── */
    #sidebar {

      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;

    .sb-logo {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .sb-logo-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .sb-logo-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
      letter-spacing: .05em;
      text-transform: uppercase;

    .sb-search-wrap {

      border-bottom: 1px solid var(--border);

    .sb-search {

      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);

      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border .2s;
    }

    .sb-search:focus {
      border-color: var(--accent);
    }

    .sb-tabs {
      display: flex;
      gap: 0;
      padding: 8px 12px 0;
    }

    .sb-tab {
      flex: 1;
      padding: 5px 4px;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
      background: var(--bg3);
      color: var(--text3);
      border-radius: 4px;
      margin: 0 2px;
      text-transform: uppercase;
      letter-spacing: .06em;
      transition: all .2s;
    }

    .sb-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 20px;
    }

    .sb-list::-webkit-scrollbar {
      width: 4px;
    }

    .sb-list::-webkit-scrollbar-thumb {

      border-radius: 2px;
    }

    .sb-section {
      font-size: 9px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .1em;
      padding: 10px 16px 3px;

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      cursor: pointer;

  <script>
    // ══════════════════════════════════════════════
    //  DATA — All Topics
    // ══════════════════════════════════════════════
    const topics = [

      // ────────────────────────────────────────────
      // JAVASCRIPT CORE
      // ────────────────────────────────────────────
      {
        id: 'var_let_const', grp: 'js', sec: 'JS Core', color: '#a78bfa', icon: '📦',
        label: 'var vs let vs const',
        tag: 'JS Fundamentals', tagColor: 'rgba(167,139,250,.2)', tagText: '#a78bfa',
        tagline: 'Variable declaration ke 3 tarike — scope, hoisting aur reassignment samjho',
        what: `<b>var</b> = function scoped variable (ES5). <b>let</b> = block scoped variable (ES6). <b>const</b> = block scoped constant jo ek baar assign hone ke baad reassign nahi ho sakta. Teen alag tarike hain JS mein variables declare karne ke.`,
        why: `<b>var</b> ke saath bahut problems the — function scope se variables leak hote the, hoisting se confusing undefined aata tha. <b>let/const</b> ne in problems solve kiye: block scope, Temporal Dead Zone, aur const se accidental reassignment rokna.`,
        when: `<b>const</b> = default choice (hamesha prefer karo). <b>let</b> = jab value change karni ho (loop counter, reassignable). <b>var</b> = kabhi mat use karo new code mein — sirf legacy code mein milega.`,
        where: `<code>const</code> → functions, objects, arrays, imports. <code>let</code> → loop variables, conditionally assigned vars. <code>var</code> → old code read karte waqt samajhne ke liye.`,
        how: `Declare karo, assign karo, const ke saath initialize karna zaroor hai. let/const mein Temporal Dead Zone hota hai — before declaration access = ReferenceError.`,
        warn: `const object ko reassign nahi kar sakte lekin properties change ho sakti hain! <code>const arr = []; arr.push(1)</code> — ye kaam karta hai! Sirf reference lock hota hai.`,
        tip: `Loop closure trick: <code>var</code> loop mein <code>setTimeout</code> = 3 3 3 (shared var). <code>let</code> loop mein = 0 1 2 (new binding per iteration).`,
        code: `// var — Function Scoped (AVOID!)
var x = 10;
if (true) {
  var x = 20;        // Same variable overwrite!
  console.log(x);    // 20
}
console.log(x);      // 20 — leaked out!

// let — Block Scoped ✅
let y = 10;
if (true) {
  let y = 20;        // Different variable
  console.log(y);    // 20
}
console.log(y);      // 10 — safe!

// const — Block Scoped + No Reassign ✅
const PI = 3.14159;
// PI = 3.15;         // ❌ TypeError!

// const with objects — properties change ho sakti hain
const user = { name: 'Rahul', city: 'Mumbai' };
user.name = 'Priya';  // ✅ Works (property change)
// user = {};          // ❌ TypeError (reference change)

// Hoisting comparison
console.log(a);        // undefined (var hoisted)
var a = 5;

// console.log(b);     // ❌ ReferenceError (TDZ)
let b = 5;

// Classic interview: loop closure
for (var i = 0; i < 3; i++) {
  setTimeout(() => console.log(i), 0); // 3 3 3 ← bug!
}
for (let j = 0; j < 3; j++) {
  setTimeout(() => console.log(j), 0); // 0 1 2 ← correct!
}`,

          { q: 'var, let, const mein kya fark hai? Scope explain karo.', a: '<b>var</b> = function scoped, hoisted (undefined pe), redeclare + reassign possible. <b>let</b> = block scoped, TDZ (ReferenceError before declaration), reassign possible. <b>const</b> = block scoped, TDZ, declaration ke saath initialize karna zaroori, NO reassign. Best practice: <b>const by default, let jab zarurat ho, var kabhi nahi</b>.' },

function useDebounce(value, delay = 300) {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const timer = setTimeout(() => setDebounced(value), delay);

        what: `Primitive values (number, string, boolean) copy by VALUE hote hain. Objects/Arrays copy by REFERENCE — dono variables ek hi memory point karte hain. <b>Shallow copy</b>: top-level copy, nested same reference. <b>Deep copy</b>: sab levels par new copies.`,

        where: `useState update, Redux reducers, API response processing, configuration objects clone karna.`,
        how: `Shallow: spread (<code>{...obj}</code>), Object.assign(). Deep: <code>structuredClone(obj)</code> (modern best), JSON.parse/stringify (no functions), lodash cloneDeep.`,

        code: `// Primitive — copy by VALUE

let b = a;
b = 10;
console.log(a); // 5 — unchanged!

const obj1 = { name: 'Rahul', age: 25 };
const obj2 = obj1;          // Same reference!
obj2.name = 'Priya';
console.log(obj1.name);     // 'Priya' — obj1 bhi change!

// Shallow Copy — top level copy, nested shared
const shallow = { ...obj1 };           // Spread
const shallow2 = Object.assign({}, obj1);

const nested = { user: { name: 'Rahul' }, count: 1 };
const shallowCopy = { ...nested };
shallowCopy.user.name = 'Priya';       // nested.user.name bhi change! ⚠️
shallowCopy.count = 99;                 // nested.count nahi change ✅

// Deep Copy methods
// 1. structuredClone — Modern, BEST ✅
const deepCopy = structuredClone(nested);
deepCopy.user.name = 'Priya';
console.log(nested.user.name);          // 'Rahul' — safe!

// 2. JSON hack — simple but limited

// ❌ Loses: functions, undefined, Date, RegExp, Map, Set

        what: `JS performance = fast execution + no memory leaks + smooth rendering. Key areas: <b>DOM manipulation</b> (batch reads/writes), <b>memory management</b> (cleanup listeners), <b>algorithm complexity</b> (right data structure), <b>main thread blocking</b> (web workers).`,
        why: `Slow JS = poor user experience + bad Core Web Vitals + lower Google ranking. Mobile devices especially sensitive hain — less CPU, less RAM.`,
        when: `Large datasets, animations, real-time features, mobile-first apps, any perceived sluggishness.`,
        where: `Event handlers, scroll/resize listeners, animation loops, data transformations, third-party integrations.`,
        how: `Profile first (Chrome DevTools Performance tab). Identify bottleneck. Fix (batch DOM, memoize, Web Worker). Profile again.`,
        warn: `Premature optimization time waste hai. <b>Measure first!</b> Dev tools se actual bottleneck find karo. Perceived performance bhi matters — skeleton loaders, optimistic UI.`,
        tip: `Debounce resize/scroll: <code>window.addEventListener('resize', debounce(handler, 150))</code>. requestAnimationFrame for animations — browser refresh rate sync hota hai.`,
        code: `// 1. Layout Thrashing — AVOID!
// ❌ Read-Write alternation = multiple reflows
elements.forEach(el => {
  const h = el.offsetHeight;        // READ (forces reflow)
  el.style.height = (h + 10) + 'px'; // WRITE
});

// ✅ Batch reads, then writes
const heights = elements.map(el => el.offsetHeight); // All reads
elements.forEach((el, i) => el.style.height = (heights[i]+10)+'px'); // All writes

// 2. requestAnimationFrame — smooth animation
function animate(timestamp) {
  const progress = (timestamp - start) / duration;
  element.style.transform = \`translateX(\${progress * 300}px)\`;

  if (progress < 1) requestAnimationFrame(animate); // Next frame
}
const start = performance.now();
requestAnimationFrame(animate); // Start!

// 3. Memoization — cache expensive results
function memoize(fn) {
  const cache = new Map();
  return function(...args) {
    const key = JSON.stringify(args);
    if (cache.has(key)) return cache.get(key);
    const result = fn.apply(this, args);
    cache.set(key, result);
    return result;
  };
}

const expensiveCalc = memoize((n) => {
  // Fibonacci as example
  if (n <= 1) return n;
  return expensiveCalc(n-1) + expensiveCalc(n-2);
});

// 4. Memory leak prevention
function Component() {
  useEffect(() => {
    const handler = () => { /* ... */ };
    window.addEventListener('resize', handler);
    const timer = setInterval(() => { /* ... */ }, 1000);
    const ws = new WebSocket('wss://...');

    return () => {
      // ✅ Sab cleanup karo!
      window.removeEventListener('resize', handler);
      clearInterval(timer);
      ws.close();
    };
  }, []);
}

// 5. Efficient data structures
// ❌ Slow — O(n) lookup
const arr = [{ id: 1 }, { id: 2 }, ...];
const item = arr.find(x => x.id === 5); // Linear search!

// ✅ Fast — O(1) lookup
const map = new Map(arr.map(x => [x.id, x]));
const item2 = map.get(5); // Instant!

// 6. Debounce & Throttle
const debounce = (fn, ms) => {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
};

const throttle = (fn, ms) => {
  let last = 0;
  return (...args) => { const now = Date.now(); if (now-last >= ms) { last=now; fn(...args); } };
};

window.addEventListener('scroll', throttle(updateScrollbar, 100));
searchInput.addEventListener('input', debounce(searchAPI, 300));`,
        qa: [
          { q: 'Memory leak JavaScript mein kaise detect aur fix karein?', a: '<b>Detect</b>: Chrome DevTools → Memory tab → Heap Snapshot → compare over time (growing = leak). <b>Common causes</b>: 1) Event listeners remove nahi kiye (removeEventListener). 2) setInterval clear nahi kiya. 3) Closure bade objects hold kar raha. 4) DOM references global variables mein. <b>Fix</b>: useEffect cleanup function hamesha return karo. WeakMap/WeakRef large objects ke liye. Strict React Strict Mode double-invokes effects — cleanup bugs expose karta hai.' },
          { q: 'Layout thrashing kya hai?', a: 'Layout thrashing = DOM read ke immediately baad write, phir read, phir write — browser ko bar bar layout recalculate karna padta hai. Example: offsetHeight read → style.height write → offsetHeight read again = 2 reflows. Fix: 1) Sab reads pehle batch karo. 2) Phir sab writes. 3) requestAnimationFrame mein DOM updates. 4) CSS transforms use karo (GPU-accelerated, no layout trigger). FastDOM library: scheduleRead/scheduleWrite.' },
        ]
      },

    ];

    // ══════════════════════════════════════════════
    //  APP STATE
    // ══════════════════════════════════════════════
    let currentTopic = 'home';
    let currentTab = 'all';
    let openQAs = new Set();

    // ══════════════════════════════════════════════
    //  SIDEBAR
    // ══════════════════════════════════════════════
    function getFiltered(tab, filter) {
      return topics.filter(t => {
        if (tab !== 'all' && t.grp !== tab) return false;
        if (filter && !t.label.toLowerCase().includes(filter.toLowerCase())) return false;
        return true;
      });
    }

    function renderSidebar(filter = '') {
      const list = document.getElementById('sidebarList');
      const filtered = getFiltered(currentTab, filter);
      const sections = {};
      filtered.forEach(t => {
        if (!sections[t.sec]) sections[t.sec] = [];
        sections[t.sec].push(t);
      });

      let html = `
    <div style="padding:6px 0;">
      <button class="sb-item ${currentTopic === 'home' ? 'active' : ''}" onclick="navigate('home')">
        <span class="sb-dot" style="background:#7c6fff"></span>🏠 Home
      </button>
    </div>`;

      Object.entries(sections).forEach(([sec, items]) => {
        html += `<div class="sb-section">${sec}</div>`;
        items.forEach(t => {
          const grpLabel = t.grp === 'js' ? 'JS' : 'RCT';
          const grpColor = t.grp === 'js' ? '#f7df1e' : '#61dafb';
          html += `<button class="sb-item ${currentTopic === t.id ? 'active' : ''}" onclick="navigate('${t.id}')">
        <span class="sb-dot" style="background:${t.color}"></span>
        <span style="flex:1">${t.label}</span>
        <span class="sb-badge" style="background:rgba(${t.grp === 'js' ? '247,223,30' : '97,218,251'},.15);color:${grpColor}">${grpLabel}</span>
      </button>`;
        });
      });

      list.innerHTML = html;
    }

    function filterTopics(val) {
      renderSidebar(val);
    }

    function setTab(tab) {
      currentTab = tab;
      ['all', 'js', 'react'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
      });
      renderSidebar(document.getElementById('searchInput').value);
    }

    // ══════════════════════════════════════════════
    //  NAVIGATION
    // ══════════════════════════════════════════════
    function navigate(id) {
      currentTopic = id;
      openQAs = new Set();
      renderSidebar(document.getElementById('searchInput').value);
      renderContent();
      document.getElementById('main').scrollTop = 0;
    }

    function getNav() {
      const ids = topics.map(t => t.id);
      const i = ids.indexOf(currentTopic);
      return {
        prev: i > 1 ? ids[i - 1] : null,
        next: i < ids.length - 1 ? ids[i + 1] : null
      };
    }

    function getProgress() {
      const ids = topics.filter(t => t.id !== 'home').map(t => t.id);
      const i = ids.indexOf(currentTopic);
      return i < 0 ? 0 : Math.round(((i + 1) / ids.length) * 100);
    }

    // ══════════════════════════════════════════════
    //  SYNTAX HIGHLIGHT
    // ══════════════════════════════════════════════
    function highlight(code) {
      return code
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/(\/\/.*?)(?=\n|$)/g, '<span class="cm">$1</span>')
        .replace(/(`[^`\n]*`)/g, '<span class="str">$1</span>')
        .replace(/('[^'\n]*'|"[^"\n]*")/g, '<span class="str">$1</span>')
        .replace(/\b(import|export|from|const|let|var|function|return|async|await|if|else|new|typeof|true|false|null|undefined|class|extends|default|throw|try|catch|finally|this|super|static|of|in|for|while|break|switch|case|interface|type|implements|yield|delete|instanceof|void)\b/g, '<span class="kw">$1</span>')
        .replace(/\b(useState|useEffect|useRef|useMemo|useCallback|useContext|useReducer|createContext|useId|useTransition|useDeferredValue|createPortal|forwardRef|memo|lazy|Suspense|Fragment|useNavigate|useParams|useSearchParams|useVirtualizer|useQuery|useMutation|useForm|renderHook|act|render|screen|waitFor|create)\b/g, '<span class="fn">$1</span>')
        .replace(/\b(React|ReactDOM|Promise|Object|Array|Math|JSON|console|window|document|Map|Set|WeakMap|Error|setTimeout|setInterval|clearTimeout|clearInterval|fetch|localStorage|sessionStorage)\b/g, '<span class="cls">$1</span>')
        .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
    }

    // ══════════════════════════════════════════════
    //  COPY CODE
    // ══════════════════════════════════════════════
    function copyCode(topicId) {
      const t = topics.find(x => x.id === topicId);
      if (!t) return;
      navigator.clipboard.writeText(t.code).then(() => {
        const btn = document.querySelector('.copy-btn');
        if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = 'Copy', 2000); }
      });
    }

    // ══════════════════════════════════════════════
    //  QA TOGGLE
    // ══════════════════════════════════════════════
    function toggleQA(i) {
      openQAs.has(i) ? openQAs.delete(i) : openQAs.add(i);
      document.querySelectorAll('.qa-a').forEach((el, j) => el.classList.toggle('open', openQAs.has(j)));
      document.querySelectorAll('.qa-chev').forEach((el, j) => el.textContent = openQAs.has(j) ? '▲' : '▼');
    }

    // ══════════════════════════════════════════════
    //  RENDER CONTENT
    // ══════════════════════════════════════════════
    function renderContent() {
      const area = document.getElementById('content');
      if (currentTopic === 'home') { renderHome(area); return; }
      console.log(currentTopic)
      let topisCur = [];
      const t = topics.find(x => {
        topisCur.push(x)
        return x?.id === currentTopic
      });
      console.log(currentTopic)
      if (!t) return;

      const { prev, next } = getNav();
      const progress = getProgress();

      area.innerHTML = `
    <div class="animate-in">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

      <div class="topic-breadcrumb">
        <a onclick="navigate('home')">Home</a> ›
        <span style="color:var(--text3)">${t.sec}</span> ›
        <span style="color:var(--text2)">${t.label}</span>
      </div>

      <div class="topic-header">
        <div class="topic-tag" style="background:${t.tagColor};color:${t.tagText}">${t.tag}</div>
        <div class="topic-h1">${t.label}</div>
        <div class="topic-tagline">${t.tagline}</div>
      </div>

      <!-- 5W Framework -->
      <div class="fivew-grid">
        <div class="fivew-card">
          <div class="fivew-icon">❓</div>
          <div class="fivew-label" style="color:#a78bfa">WHAT — Kya hai?</div>
          <div class="fivew-text">${t.what}</div>
        </div>
        <div class="fivew-card">
          <div class="fivew-icon">💡</div>
          <div class="fivew-label" style="color:#fb923c">WHY — Kyun use karein?</div>
          <div class="fivew-text">${t.why}</div>
        </div>
        <div class="fivew-card">
          <div class="fivew-icon">⏰</div>
          <div class="fivew-label" style="color:#4ade80">WHEN — Kab use karein?</div>
          <div class="fivew-text">${t.when}</div>
        </div>
        <div class="fivew-card">
          <div class="fivew-icon">📍</div>
          <div class="fivew-label" style="color:#38bdf8">WHERE — Kahan use karein?</div>
          <div class="fivew-text">${t.where}</div>
        </div>
        <div class="fivew-card full">
          <div class="fivew-icon">🛠️</div>
          <div class="fivew-label" style="color:#f472b6">HOW — Kaise use karein?</div>
          <div class="fivew-text">${t.how}</div>
        </div>
      </div>

      ${t.warn ? `<div class="warn-box">⚠️ <b>Dhyan rakh:</b> ${t.warn}</div>` : ''}
      ${t.tip ? `<div class="tip-box">💡 <b>Pro Tip:</b> ${t.tip}</div>` : ''}

      <!-- Code Example -->
      <div class="code-section">
        <div class="code-section-head">
          <div class="code-section-title">
            <span style="color:${t.color}">●</span>
            Code Example — Interview Ready
            <span class="chip chip-${t.grp === 'react' ? 'react' : 'js'}">${t.grp === 'react' ? 'React' : 'JavaScript'}</span>
          </div>
          <button class="copy-btn" onclick="copyCode('${t.id}')">Copy</button>
        </div>
        <div class="code-block"><pre>${highlight(t.code)}</pre></div>
      </div>

      <!-- Interview QA -->
      <div class="qa-section">
        <div class="qa-title">🎯 Interview Questions — Mix Hindi + English</div>
        <div class="info-box">💬 <b>Tip:</b> In sawalon ke jawab yaad karo — 90% companies mein ye hi poochhte hain. Click karke answer dekho.</div>
        ${t.qa.map((qa, i) => `
          <div class="qa-item">
            <div class="qa-q" onclick="toggleQA(${i})">
              <span class="qa-q-text">Q${i + 1}. ${qa.q}</span>
              <span class="qa-chev">${openQAs.has(i) ? '▲' : '▼'}</span>
            </div>
            <div class="qa-a ${openQAs.has(i) ? 'open' : ''}">
              <div class="qa-a-inner">${qa.a}</div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Navigation -->
      <div class="nav-btns">
        ${prev ? `<button class="nav-btn nav-prev" onclick="navigate('${prev}')">← Pehla Topic</button>` : ''}
        ${next ? `<button class="nav-btn nav-next" onclick="navigate('${next}')">Agla Topic →</button>` : `<button class="nav-btn nav-next" onclick="navigate('home')">🏠 Home</button>`}
      </div>
    </div>`;
    }

    // ══════════════════════════════════════════════
    //  RENDER HOME
    // ══════════════════════════════════════════════
    function renderHome(area) {
      const jsTopics = topics.filter(t => t.grp === 'js');
      const reactTopics = topics.filter(t => t.grp === 'react');
      const total = topics.length;

      const renderGroup = (items, title, icon, color) => {
        const sections = {};
        items.forEach(t => { if (!sections[t.sec]) sections[t.sec] = []; sections[t.sec].push(t); });

        return `
      <div class="home-grid-title">
        <span style="font-size:18px">${icon}</span>
        <span style="color:${color}">${title}</span>
        <span style="color:var(--text3);font-size:11px;font-weight:400">(${items.length} topics)</span>
      </div>
      ${Object.entries(sections).map(([sec, list]) => `
        <div style="margin-bottom:6px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:10px 0 6px;font-weight:600">${sec}</div>
          <div class="home-grid">
            ${list.map(t => `
              <div class="home-card" onclick="navigate('${t.id}')">
                <div class="home-card-icon">${t.icon}</div>
                <div class="home-card-name">${t.label}</div>
                <div class="home-card-cat" style="color:${t.color}">${t.sec}</div>
              </div>`).join('')}
          </div>
        </div>`).join('')}`;
      };

      area.innerHTML = `
    <div class="animate-in">
      <div class="home-hero">
        <div class="home-hero-title">⚡ Complete Interview Guide<br>JS + ES6 + React</div>
        <div class="home-hero-sub">
          Har topic pe <b>What, Why, When, Where, How</b> — Mix Hindi + English explanations ke saath.
          Code examples, interview Q&As, aur pro tips. Sidebar se tab filter karo ya search karo.
        </div>
        <div class="home-stats">
          <div class="stat-box"><div class="stat-n">${total}</div><div class="stat-l">Topics</div></div>
          <div class="stat-box"><div class="stat-n">${total * 5}</div><div class="stat-l">5W Answers</div></div>
          <div class="stat-box"><div class="stat-n">${total * 2}+</div><div class="stat-l">Interview Q&As</div></div>
          <div class="stat-box"><div class="stat-n">Mix</div><div class="stat-l">HI + EN</div></div>
        </div>
      </div>

      <div class="tip-box">
        🎯 <b>Interview Strategy:</b> Har topic ka WHAT → WHY → WHEN/WHERE → HOW sequence follow karo jawab dete waqt. Code example se demonstrate karo. Ye approach interviewer impress karta hai.
      </div>

      ${renderGroup(jsTopics, 'JavaScript + ES6 Topics', '🟡', '#f7df1e')}
      ${renderGroup(reactTopics, 'React JS Topics', '⚛️', '#61dafb')}
    </div>`;
    }

    // ══════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════
    renderSidebar();
    renderContent();
  </script>
</body>
